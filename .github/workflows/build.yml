name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: LogFilter-macOS
            package_path: LogFilter-macOS.zip
          - os: windows-latest
            artifact_name: LogFilter-Windows
            package_path: LogFilter-Windows.zip
          - os: ubuntu-latest
            artifact_name: LogFilter-Linux
            package_path: LogFilter-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install pake CLI
        run: npm install -g pake-cli

      - name: Verify build toolchain
        shell: bash
        run: |
          python --version
          node --version
          npm --version
          rustc --version
          cargo --version
          pake --version

      - name: Start backend server on macOS/Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          nohup python app.py > backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
          python - <<'PY'
          import socket
          import sys
          import time

          for _ in range(30):
              try:
                  with socket.create_connection(("127.0.0.1", 8052), timeout=1):
                      sys.exit(0)
              except OSError:
                  time.sleep(2)

          sys.exit(1)
          PY
          cat backend.log

      - name: Start backend server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process python -ArgumentList 'app.py' -RedirectStandardOutput 'backend.log' -RedirectStandardError 'backend.err.log' -PassThru
          "BACKEND_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 8052)); s.close()"
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 2
          }
          Get-Content backend.log -ErrorAction SilentlyContinue
          Get-Content backend.err.log -ErrorAction SilentlyContinue
          if (-not $ready) {
            exit 1
          }

      - name: Build with pake on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          export PAKE_CREATE_APP=1
          pake http://127.0.0.1:8052 --name LogFilter
          app_path="$(find . "$HOME" -name 'LogFilter.app' -type d | head -n 1)"
          test -n "$app_path"
          rm -rf LogFilter.app
          cp -R "$app_path" ./LogFilter.app

      - name: Build with pake on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pake http://127.0.0.1:8052 --name LogFilter
          $app = Get-ChildItem -Path $PWD,$env:LOCALAPPDATA,$env:USERPROFILE -Recurse -Include 'LogFilter.exe','*LogFilter*.exe' -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notmatch 'uninstall' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $app) {
            exit 1
          }
          Copy-Item $app.FullName -Destination 'LogFilter.exe' -Force

      - name: Build with pake on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pake http://127.0.0.1:8052 --name LogFilter --targets appimage
          app_path="$(find . "$HOME" -type f \( -name '*.AppImage' -o -name 'LogFilter' -o -name 'logfilter' \) | head -n 1)"
          test -n "$app_path"
          cp "$app_path" ./LogFilter.AppImage

      - name: Package app on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: zip -r LogFilter-macOS.zip LogFilter.app

      - name: Package app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path LogFilter.exe -DestinationPath LogFilter-Windows.zip -Force

      - name: Package app on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: tar -czf LogFilter-Linux.tar.gz LogFilter.AppImage

      - name: Stop backend server on macOS/Linux
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          if [ -n "${{ env.BACKEND_PID }}" ]; then
            kill "${{ env.BACKEND_PID }}" || true
          fi
          pkill -f "python app.py" || true

      - name: Stop backend server on Windows
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:BACKEND_PID) {
            Stop-Process -Id $env:BACKEND_PID -Force -ErrorAction SilentlyContinue
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -print
          test -n "$(find release-assets -maxdepth 1 -type f | head -n 1)"

      - name: Publish release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "${files[@]}" --clobber
          else
            gh release create "$tag_name" "${files[@]}"
          fi
