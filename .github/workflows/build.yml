name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: LogFilter-macOS
            package_path: LogFilter-macOS.zip
          - os: windows-latest
            artifact_name: LogFilter-Windows
            package_path: LogFilter-Windows.zip
          - os: ubuntu-latest
            artifact_name: LogFilter-Linux
            package_path: LogFilter-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install pake CLI
        run: npm install -g pake-cli

      - name: Verify build toolchain
        shell: bash
        run: |
          python --version
          node --version
          npm --version
          rustc --version
          cargo --version
          pake --version

      - name: Start backend server on macOS/Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          nohup python -u app.py --host 127.0.0.1 --port 8052 > backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
          if ! python - <<'PY'
          import socket
          import sys
          import time
          import urllib.request

          last_error = ""

          for _ in range(60):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8052", timeout=2) as response:
                      if response.status < 500:
                          sys.exit(0)
              except Exception as exc:
                  last_error = str(exc)

              try:
                  with socket.create_connection(("127.0.0.1", 8052), timeout=1):
                      sys.exit(0)
              except OSError as exc:
                  last_error = str(exc)

              time.sleep(2)

          print(last_error)
          sys.exit(1)
          PY
          then
            cat backend.log || true
            exit 1
          fi
          cat backend.log || true

      - name: Start backend server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $python = (Get-Command python).Source
          $arguments = @('-u', 'app.py', '--host', '127.0.0.1', '--port', '8052')
          $process = Start-Process -FilePath $python -ArgumentList $arguments -RedirectStandardOutput 'backend.log' -RedirectStandardError 'backend.err.log' -PassThru
          "BACKEND_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            python -c "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8052', timeout=2); sys.exit(0)"
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            $process.Refresh()
            if ($process.HasExited) {
              break
            }
            Start-Sleep -Seconds 2
          }
          Get-Content backend.log -ErrorAction SilentlyContinue
          Get-Content backend.err.log -ErrorAction SilentlyContinue
          if (-not $ready) {
            $process.Refresh()
            if ($process.HasExited) {
              Write-Host "Backend exited with code $($process.ExitCode)"
            } else {
              Write-Host "Backend did not become ready before timeout"
            }
            netstat -ano | Select-String ':8052'
            exit 1
          }

      - name: Build with pake on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          export PAKE_CREATE_APP=1
          xcode-select -p
          xcrun --sdk macosx --show-sdk-path
          if ! pake http://127.0.0.1:8052 --name LogFilter --debug 2>&1 | tee pake-build.log; then
            find "$PWD" "$HOME/Applications" "$HOME/Downloads" -maxdepth 5 -name 'LogFilter.app' -type d -print || true
            exit 1
          fi
          app_path="$(find "$PWD" "$HOME/Applications" "$HOME/Downloads" -maxdepth 5 -name 'LogFilter.app' -type d -print | head -n 1)"
          test -n "$app_path"
          rm -rf LogFilter.app
          cp -R "$app_path" ./LogFilter.app

      - name: Build with pake on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & pake http://127.0.0.1:8052 --name LogFilter --debug *>&1 | Tee-Object -FilePath 'pake-build.log'
          if ($LASTEXITCODE -ne 0) {
            Get-ChildItem -Path $PWD,(Join-Path $env:LOCALAPPDATA 'Programs'),(Join-Path $env:USERPROFILE 'Desktop'),(Join-Path $env:USERPROFILE 'Downloads') -Recurse -Include 'LogFilter.exe','*LogFilter*.exe' -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 20 FullName, LastWriteTime
            exit $LASTEXITCODE
          }
          $app = Get-ChildItem -Path $PWD,(Join-Path $env:LOCALAPPDATA 'Programs'),(Join-Path $env:USERPROFILE 'Desktop'),(Join-Path $env:USERPROFILE 'Downloads') -Recurse -Include 'LogFilter.exe','*LogFilter*.exe' -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notmatch 'uninstall' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $app) {
            Get-ChildItem -Path $PWD,(Join-Path $env:LOCALAPPDATA 'Programs'),(Join-Path $env:USERPROFILE 'Desktop'),(Join-Path $env:USERPROFILE 'Downloads') -Recurse -Include 'LogFilter.exe','*LogFilter*.exe' -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 20 FullName, LastWriteTime
            exit 1
          }
          Copy-Item $app.FullName -Destination 'LogFilter.exe' -Force

      - name: Build with pake on Linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          set -euo pipefail
          if ! pake http://127.0.0.1:8052 --name LogFilter --targets appimage --debug 2>&1 | tee pake-build.log; then
            find "$PWD" "$HOME/.cache" "$HOME/.local/share" "$HOME/Downloads" -maxdepth 5 -type f \( -name '*.AppImage' -o -name 'LogFilter' -o -name 'logfilter' \) -print || true
            exit 1
          fi
          app_path="$(find "$PWD" "$HOME/.cache" "$HOME/.local/share" "$HOME/Downloads" -maxdepth 5 -type f \( -name '*.AppImage' -o -name 'LogFilter' -o -name 'logfilter' \) -print | head -n 1)"
          test -n "$app_path"
          cp "$app_path" ./LogFilter.AppImage

      - name: Package app on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: zip -r LogFilter-macOS.zip LogFilter.app

      - name: Package app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path LogFilter.exe -DestinationPath LogFilter-Windows.zip -Force

      - name: Package app on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: tar -czf LogFilter-Linux.tar.gz LogFilter.AppImage

      - name: Stop backend server on macOS/Linux
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          if [ -n "${{ env.BACKEND_PID }}" ]; then
            kill "${{ env.BACKEND_PID }}" || true
          fi
          pkill -f "python app.py" || true

      - name: Stop backend server on Windows
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:BACKEND_PID) {
            Stop-Process -Id $env:BACKEND_PID -Force -ErrorAction SilentlyContinue
          }

      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-debug-logs
          path: |
            backend.log
            backend.err.log
            pake-build.log
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          find release-assets -maxdepth 1 -type f -print
          test -n "$(find release-assets -maxdepth 1 -type f | head -n 1)"

      - name: Publish release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "${files[@]}" --clobber
          else
            gh release create "$tag_name" "${files[@]}"
          fi
