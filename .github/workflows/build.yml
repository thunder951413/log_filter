name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install pake (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pake
      
      - name: Install pake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          winget install tw93.pake
          echo "$env:LOCALAPPDATA\Programs\pake" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install Rust and pake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Installing Rust..."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          echo "Rust version:"
          rustc --version
          echo "Installing pake..."
          cargo install pake-cli || echo "pake install failed, will try alternative"
          echo "Adding cargo bin to PATH"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Start backend server
        run: |
          nohup python app.py > backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          
          for i in {1..30}; do
            if python -c "import socket; s=socket.socket(); s.connect(('localhost', 8052)); s.close()" 2>/dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          
          cat backend.log || true
      
      - name: Build with pake (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pake http://localhost:8052 --name LogFilter
          find ~ -name "LogFilter.app" -type d -exec cp -R {} . \; || true
      
      - name: Build with pake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pake http://localhost:8052 --name LogFilter
          Get-ChildItem -Path "$env:LOCALAPPDATA" -Recurse -Filter "LogFilter.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName -Destination . }
      
      - name: Build with pake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          source $HOME/.cargo/env
          echo "Building with pake..."
          pake http://localhost:8052 --name LogFilter || echo "pake build failed"
          echo "Searching for built executable..."
          find ~ -name "LogFilter" -type f -executable 2>/dev/null | head -1 | xargs -I {} cp {} . 2>/dev/null || true
          find ~ -name "logfilter" -type f -executable 2>/dev/null | head -1 | xargs -I {} cp {} . 2>/dev/null || true
          ls -la LogFilter* 2>/dev/null || echo "No LogFilter executable found"
      
      - name: Find and package app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "LogFilter.app" ]; then
            zip -r LogFilter-macOS.zip LogFilter.app
          else
            echo "LogFilter.app not found, creating empty archive"
            zip -r LogFilter-macOS.zip --files-from=/dev/null
          fi
      
      - name: Find and package app (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path "LogFilter.exe") {
            Compress-Archive -Path LogFilter.exe -DestinationPath LogFilter-Windows.zip
          } else {
            echo "LogFilter.exe not found, creating empty archive"
            Compress-Archive -Path $null -DestinationPath LogFilter-Windows.zip
          }
      
      - name: Find and package app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -f "LogFilter" ]; then
            tar -czf LogFilter-Linux.tar.gz LogFilter
          elif [ -f "logfilter" ]; then
            tar -czf LogFilter-Linux.tar.gz logfilter
          else
            echo "No executable found, creating empty archive"
            tar -czf LogFilter-Linux.tar.gz --files-from=/dev/null
          fi
      
      - name: Stop backend server
        if: always()
        run: |
          if [ -n "${{ env.BACKEND_PID }}" ]; then
            kill ${{ env.BACKEND_PID }} || true
          fi
          pkill -f "python app.py" || true
      
      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogFilter-macOS
          path: LogFilter-macOS.zip
      
      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogFilter-Windows
          path: LogFilter-Windows.zip
      
      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogFilter-Linux
          path: LogFilter-Linux.tar.gz
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LogFilter-macOS/LogFilter-macOS.zip
            LogFilter-Windows/LogFilter-Windows.zip
            LogFilter-Linux/LogFilter-Linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
