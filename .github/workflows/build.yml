name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: LogFilter-macOS
            package_path: LogFilter-macOS.zip
          - os: windows-latest
            artifact_name: LogFilter-Windows
            package_path: LogFilter-Windows.zip
          - os: ubuntu-latest
            artifact_name: LogFilter-Linux
            package_path: LogFilter-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install pake on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: brew install pake

      - name: Install pake on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id tw93.pake --accept-source-agreements --accept-package-agreements
          "$env:LOCALAPPDATA\Programs\pake" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install pake on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install pake-cli
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Start backend server on macOS/Linux
        if: runner.os != 'Windows'
        shell: bash
        run: |
          nohup python app.py > backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
          python - <<'PY'
          import socket
          import sys
          import time

          for _ in range(30):
              try:
                  with socket.create_connection(("127.0.0.1", 8052), timeout=1):
                      sys.exit(0)
              except OSError:
                  time.sleep(2)

          sys.exit(1)
          PY
          cat backend.log

      - name: Start backend server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process python -ArgumentList 'app.py' -RedirectStandardOutput 'backend.log' -RedirectStandardError 'backend.err.log' -PassThru
          "BACKEND_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 8052)); s.close()"
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 2
          }
          Get-Content backend.log -ErrorAction SilentlyContinue
          Get-Content backend.err.log -ErrorAction SilentlyContinue
          if (-not $ready) {
            exit 1
          }

      - name: Build with pake on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pake http://127.0.0.1:8052 --name LogFilter
          app_path="$(find "$HOME" -name 'LogFilter.app' -type d | head -n 1)"
          test -n "$app_path"
          cp -R "$app_path" .

      - name: Build with pake on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pake http://127.0.0.1:8052 --name LogFilter
          $app = Get-ChildItem -Path $env:LOCALAPPDATA,$env:USERPROFILE -Recurse -Filter 'LogFilter.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $app) {
            exit 1
          }
          Copy-Item $app.FullName -Destination .

      - name: Build with pake on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          source "$HOME/.cargo/env"
          pake http://127.0.0.1:8052 --name LogFilter
          app_path="$(find "$HOME" -name 'LogFilter' -type f -executable | head -n 1)"
          if [ -z "$app_path" ]; then
            app_path="$(find "$HOME" -name 'logfilter' -type f -executable | head -n 1)"
          fi
          test -n "$app_path"
          cp "$app_path" .

      - name: Package app on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: zip -r LogFilter-macOS.zip LogFilter.app

      - name: Package app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path LogFilter.exe -DestinationPath LogFilter-Windows.zip -Force

      - name: Package app on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ -f "LogFilter" ]; then
            tar -czf LogFilter-Linux.tar.gz LogFilter
          else
            tar -czf LogFilter-Linux.tar.gz logfilter
          fi

      - name: Stop backend server on macOS/Linux
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          if [ -n "${{ env.BACKEND_PID }}" ]; then
            kill "${{ env.BACKEND_PID }}" || true
          fi
          pkill -f "python app.py" || true

      - name: Stop backend server on Windows
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:BACKEND_PID) {
            Stop-Process -Id $env:BACKEND_PID -Force -ErrorAction SilentlyContinue
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          shopt -s globstar nullglob
          tag_name="${GITHUB_REF#refs/tags/}"
          files=(release-assets/**/*)
          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "${files[@]}" --clobber
          else
            gh release create "$tag_name" "${files[@]}"
          fi
