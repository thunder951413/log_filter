name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install pake (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pake
      
      - name: Install pake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          winget install tw93.pake
          echo "$env:LOCALAPPDATA\Programs\pake" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install pake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
          source $HOME/.cargo/env
          cargo install pake-cli
      
      - name: Start backend server
        run: |
          python app.py > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 15
          cat backend.log
      
      - name: Build with pake (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pake http://localhost:8052 --name LogFilter
          ls -la ~/Library/Application\ Support/pake/ || ls -la /opt/homebrew/Cellar/pake/*/libexec/node_modules/pake-cli/src-tauri/target/*/release/bundle/
      
      - name: Build with pake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pake http://localhost:8052 --name LogFilter
          dir "%LOCALAPPDATA%\Programs\pake" || dir "%LOCALAPPDATA%\pake"
      
      - name: Build with pake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          source $HOME/.cargo/env
          pake http://localhost:8052 --name LogFilter || true
          ls -la ~/.local/share/pake/ || find ~ -name "LogFilter" -type f -o -name "logfilter" -type f 2>/dev/null | head -5
      
      - name: Find and package app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          find ~ -name "LogFilter.app" -type d -exec cp -R {} . \;
          zip -r LogFilter-macOS.zip LogFilter.app
      
      - name: Find and package app (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $appPath = Get-ChildItem -Path "$env:LOCALAPPDATA" -Recurse -Filter "LogFilter.exe" | Select-Object -First 1 -ExpandProperty FullName
          Copy-Item $appPath -Destination .
          Compress-Archive -Path LogFilter.exe -DestinationPath LogFilter-Windows.zip
      
      - name: Find and package app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          source $HOME/.cargo/env
          find ~ -name "LogFilter" -type f -executable -exec cp {} . \; 2>/dev/null || find ~ -name "logfilter" -type f -executable -exec cp {} . \; 2>/dev/null || echo "No executable found"
          if [ -f LogFilter ]; then
            tar -czf LogFilter-Linux.tar.gz LogFilter
          elif [ -f logfilter ]; then
            tar -czf LogFilter-Linux.tar.gz logfilter
          else
            echo "Creating empty archive"
            tar -czf LogFilter-Linux.tar.gz --files-from=/dev/null
          fi
      
      - name: Stop backend server
        if: ${{ always() }}
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
          pkill -f "python app.py" || true
      
      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogFilter-macOS
          path: LogFilter-macOS.zip
      
      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogFilter-Windows
          path: LogFilter-Windows.zip
      
      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogFilter-Linux
          path: LogFilter-Linux.tar.gz
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LogFilter-macOS/LogFilter-macOS.zip
            LogFilter-Windows/LogFilter-Windows.zip
            LogFilter-Linux/LogFilter-Linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
