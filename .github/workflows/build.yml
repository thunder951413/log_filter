name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: LogFilter-macOS
            package_path: LogFilter-macOS.zip
          - os: windows-latest
            artifact_name: LogFilter-Windows
            package_path: LogFilter-Windows.zip
          - os: ubuntu-latest
            artifact_name: LogFilter-Linux
            package_path: dist/*.tar.gz

    runs-on: ${{ matrix.os }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}/.cache/pyinstaller
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fakeroot \
            libarchive-tools \
            libnss3 \
            rpm

      - name: Verify build toolchain
        shell: bash
        run: |
          python --version
          node --version
          npm --version
          python -m PyInstaller --version
          npx electron-builder --version

      - name: Build desktop app on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          npm run pack:mac 2>&1 | tee package-build.log

      - name: Build desktop app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & npm run pack:win *>&1 | Tee-Object -FilePath 'package-build.log'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify Windows bundled resources
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vendorRg = Join-Path $PWD 'vendor/ripgrep/windows-x64/rg.exe'
          $packedRg = Join-Path $PWD 'dist/win-unpacked/resources/tools/rg/rg.exe'
          $serverExe = Join-Path $PWD 'dist/log_filter_server.exe'
          $serverPackedExe = Join-Path $PWD 'dist/win-unpacked/resources/python/log_filter_server.exe'
          foreach ($target in @($vendorRg, $packedRg, $serverExe, $serverPackedExe)) {
            if (-not (Test-Path $target)) {
              Write-Error "Missing expected build output: $target"
              exit 1
            }
          }
          Get-Item $vendorRg, $packedRg, $serverExe, $serverPackedExe | Select-Object FullName, Length

      - name: Build desktop app on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          npm run pack:linux 2>&1 | tee package-build.log

      - name: Package app on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.dmg dist/*.zip)
          test "${#files[@]}" -gt 0
          zip -j LogFilter-macOS.zip "${files[@]}"

      - name: Package app on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path (Join-Path $PWD 'dist') -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -in @('.exe', '.msi', '.yml', '.blockmap') }
          if (-not $artifacts) {
            Write-Host 'No Windows package artifact found in workspace'
            Get-ChildItem -Path (Join-Path $PWD 'dist') -File -ErrorAction SilentlyContinue | Select-Object Name, Length
            exit 1
          }
          Compress-Archive -Path $artifacts.FullName -DestinationPath LogFilter-Windows.zip -Force

      - name: Package app on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.tar.gz)
          test "${#files[@]}" -gt 0
          ls -lh "${files[@]}"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-debug-logs
          path: |
            package-build.log
            dist/builder-debug.yml
            dist/builder-effective-config.yaml
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
          fail_on_unmatched_files: true
